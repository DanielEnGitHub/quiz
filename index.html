<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quizziee</title>
    <link rel="icon" href="img/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="js/toastify-js/toastify.css" />
  </head>

  <body>
<div class="main">
      <!-- Pantalla: Ingreso de nombre -->
      <div class="instructions-box custom-box">
        <div class="avatar-container">
          <img src="img/avatares/01.png" alt="Avatar" class="avatar-img" id="selectedAvatar" />
          <button type="button" class="edit-avatar-btn" id="editAvatarBtn" title="Cambiar avatar">✏️</button>
        </div>
        <h1>Ingresa tu nombre</h1>
        <input
          type="text"
          class="name custom-input"
          placeholder="Escribe tu nombre aquí"
          autofocus
        />
        <button type="button" class="btn center">INGRESAR</button>
      </div>

      <!-- Pantalla: Instrucciones -->
      <div class="home-box custom-box hide">
        <img src="img/icons/FAQ.png" alt="FAQ" width="120px" />
        <h1 class="title">Instrucciones</h1>
        <p></p>
        <button type="button" class="btn center">¡Comenzar!</button>
      </div>

      <!-- Pantalla: Quiz -->
      <div class="quiz-box custom-box hide">
        <span class="timer">
          <div class="progress"></div>
          <img src="img/clock.svg" alt="Reloj" width="15" />
          <span class="bold timer-countdown">--:--</span>
        </span>

        <!-- Fase 1: Preguntas -->
        <div class="question-box-container hide">
          <div class="question-number"></div>
          <div class="question-text"></div>
          <div class="option-container"></div>
          <button type="button" class="btn next-btn disabled-btn">Siguiente</button>
          <div class="answers-indicator"></div>
        </div>

        <!-- Fase 2: Escritura -->
        <div class="question-box-container-extra hide">
          <div class="typing-test">
            <div class="typing-header">
              <h2>Prueba de Escritura</h2>
              <p class="typing-instruction">Escribí el siguiente texto:</p>
            </div>
            <div class="typing-text" id="typingText"></div>
          </div>
          <button type="button" class="btn next-btn-extra disabled-btn">Siguiente</button>
        </div>
      </div>

      <!-- Pantalla: Resultado -->
      <div class="result-box custom-box hide">
        <div class="title">
          <span class="title-2">Resultado</span>
        </div>
        <div class="points">
          <h1 class="name-result"></h1>
          <div class="rectangle"></div>
          <img src="img/icons/ribbon.png" alt="ribbon" class="ribbon" />
          <img src="img/avatares/01.png" alt="Avatar" class="avatar-img border-yellow" id="selectedAvatarResult" />
          <span class="total-score"></span>
          <div class="cards-container">
            <div class="card skyblue">
              <span></span>
              <span></span>
            </div>
            <div class="card green">
              <span></span>
              <span></span>
            </div>
            <div class="card red">
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal: Avatar -->
    <div class="avatar-modal" id="avatarModal">
      <div class="avatar-modal-content">
        <div class="avatar-modal-header">
          <h2>Selecciona tu avatar</h2>
          <button class="close-modal" id="closeModal">X</button>
        </div>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
    </div>

    <!-- Modal: Configuración -->
    <div class="settings-modal hide" id="settingsModal">
      <div class="settings-modal-content">
        <div class="settings-modal-header">
          <h2>Configuración</h2>
          <button class="close-modal" id="closeSettings">X</button>
        </div>
        <div class="settings-body">
          <p class="settings-label">Fases habilitadas:</p>

          <div class="settings-phase-block">
            <label class="settings-option">
              <input type="checkbox" id="checkPhase1" />
              <span>Fase 1 — Preguntas de opción múltiple</span>
            </label>
            <div class="settings-pts-row">
              <span>Puntaje máximo:</span>
              <input type="number" id="maxPts1" min="1" max="200" value="20" />
              <span>pts</span>
            </div>
          </div>

          <div class="settings-phase-block">
            <label class="settings-option">
              <input type="checkbox" id="checkPhase2" />
              <span>Fase 2 — Prueba de escritura</span>
            </label>
            <div class="settings-pts-row">
              <span>Puntaje máximo:</span>
              <input type="number" id="maxPts2" min="1" max="200" value="20" />
              <span>pts</span>
            </div>
          </div>

          <div class="settings-section">
            <p class="settings-label">Duración del quiz:</p>
            <div class="settings-pts-row">
              <span>Tiempo:</span>
              <input type="number" id="quizDuration" min="1" max="60" value="18" />
              <span>min</span>
            </div>
          </div>

          <div class="settings-section">
            <p class="settings-label">Banco de preguntas (Fase 1):</p>
            <div id="questionSetList"></div>
            <div class="settings-pts-row" style="margin-top: 10px;">
              <span>Preguntas a mostrar:</span>
              <input type="number" id="questionLimit" min="1" value="10" />
              <span id="questionLimitMax">/ 13</span>
            </div>
          </div>
        </div>
        <button class="btn" id="saveSettings">Guardar cambios</button>
      </div>
    </div>

    <div id="confetti-container"></div>

    <script src="js/toastify-js/toastify.js"></script>
    <script src="js/question.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
